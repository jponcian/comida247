<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Comida247</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        h1 { color: #fff; margin-bottom: 2rem; font-weight: 600; }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; color: #a0a0a0; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #e94560; }
        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: #e94560;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        button:hover { background: #ff4d6d; transform: translateY(-2px); }
        #business-select-container { display: none; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-card" id="login-form">
        <h1>Comida247</h1>
        <div class="input-group">
            <label>Cédula</label>
            <input type="text" id="cedula" placeholder="12345678">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()">Entrar</button>
        <p id="error" style="color: #ff4d6d; margin-top: 1rem; font-size: 0.9rem;"></p>
    </div>

    <div class="login-card" id="business-form" style="display: none;">
        <h1>Seleccionar Negocio</h1>
        <div class="input-group">
            <label>Negocio disponible</label>
            <select id="business-id"></select>
        </div>
        <button onclick="handleSelectBusiness()">Continuar</button>
    </div>

    <script>
        async function handleLogin() {
            const cedula = document.getElementById('cedula').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            const res = await fetch('auth.php?action=login', {
                method: 'POST',
                body: JSON.stringify({ cedula, password })
            });
            const data = await res.json();

            if (data.success) {
                if (data.businesses.length === 0) {
                    error.innerText = "No tienes negocios asignados.";
                    return;
                }
                
                // Si solo tiene uno, seleccionarlo automáticamente (opcional, mejor dejar elegir)
                const select = document.getElementById('business-id');
                select.innerHTML = data.businesses.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
                
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('business-form').style.display = 'block';
            } else {
                error.innerText = data.error;
            }
        }

        async function handleSelectBusiness() {
            const business_id = document.getElementById('business-id').value;
            const res = await fetch('auth.php?action=select_business', {
                method: 'POST',
                body: JSON.stringify({ business_id })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = 'app.html';
            }
        }

        // Verificar si ya está logueado
        fetch('auth.php?action=check').then(r => r.json()).then(data => {
            if (data.logged_in && data.business_id) window.location.href = 'app.html';
        });
    </script>
</body>
</html>
