<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast-Bite | Comida 24/7</title>
    <link rel="stylesheet" href="index.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff8c00">
</head>
<body>
    <div class="app-container">
        <nav>
            <button onclick="showSection('pedidos')" id="nav-pedidos" class="active">PEDIDOS</button>
            <button onclick="showSection('cocina')" id="nav-cocina">COCINA</button>
            <button onclick="showSection('caja')" id="nav-caja">CAJA</button>
        </nav>

        <!-- Sección Pedidos -->
        <section id="pedidos" class="view-section active">
            <h1 style="margin-bottom: 2rem;">Nuestro Menú 🍔</h1>
            <div id="menu-container" class="menu-grid">
                <!-- Productos se cargan aquí -->
            </div>
        </section>

        <!-- Sección Cocina -->
        <section id="cocina" class="view-section">
            <h1 style="margin-bottom: 2rem;">Pedidos en Cocina 🔥</h1>
            <div id="kitchen-container" class="kitchen-grid">
                <!-- Pedidos se cargan aquí -->
            </div>
        </section>

        <!-- Sección Caja -->
        <section id="caja" class="view-section">
            <h1 style="margin-bottom: 2rem;">Punto de Cobro 💰</h1>
            <div id="payment-container" class="kitchen-grid">
                <!-- Pedidos pendientes de pago se cargan aquí -->
            </div>
        </section>

        <!-- Carrito Flotante -->
        <div id="cart-float" class="cart-panel" style="display: none;" onclick="checkoutOrder()">
            <span>🛒 <strong id="cart-count">0</strong> productos</span>
            <span>|</span>
            <span id="cart-total">$0.00</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
