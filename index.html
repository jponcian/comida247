<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Los Calidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <!-- Fondo Animado -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="login-container">
        <!-- Formulario de Login -->
        <div class="login-card" id="login-form">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fas fa-utensils"></i>
                </div>
                <h1>Los Calidad</h1>
                <p>Alimentando tus sueños</p>
            </div>

            <div class="input-group">
                <label for="cedula">Cédula</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="cedula" placeholder="12345678" autocomplete="username">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>
            </div>

            <button class="btn-login" onclick="handleLogin()">
                <span>Entrar</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <p id="error" class="error-msg"></p>
        </div>

        <!-- Selección de Negocio -->
        <div class="login-card" id="business-form" style="display: none;">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fas fa-store"></i>
                </div>
                <h1>Bienvenido</h1>
                <p>Selecciona un negocio para continuar</p>
            </div>

            <div class="input-group">
                <label for="business-id">Negocio disponible</label>
                <div class="input-wrapper">
                    <i class="fas fa-shop"></i>
                    <select id="business-id"></select>
                </div>
            </div>

            <button class="btn-login" onclick="handleSelectBusiness()">
                <span>Continuar</span>
                <i class="fas fa-check"></i>
            </button>
        </div>
    </main>

    <script>
        async function handleLogin() {
            const cedula = document.getElementById('cedula').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            const btn = document.querySelector('#login-form .btn-login');
            const icon = btn.querySelector('i');

            if (!cedula || !password) {
                error.innerText = "Por favor, completa todos los campos.";
                return;
            }

            btn.classList.add('loading');
            icon.className = 'fas fa-circle-notch fa-spin';
            
            try {
                const res = await fetch('auth.php?action=login', {
                    method: 'POST',
                    body: JSON.stringify({ cedula, password })
                });
                const data = await res.json();

                if (data.success) {
                    if (data.businesses.length === 0) {
                        error.innerText = "No tienes negocios asignados.";
                        btn.classList.remove('loading');
                        icon.className = 'fas fa-arrow-right';
                        return;
                    }
                    
                    const select = document.getElementById('business-id');
                    select.innerHTML = data.businesses.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
                    
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('business-form').style.display = 'block';
                } else {
                    error.innerText = data.error || "Error de autenticación";
                    btn.classList.remove('loading');
                    icon.className = 'fas fa-arrow-right';
                }
            } catch (e) {
                error.innerText = "Error de conexión con el servidor.";
                btn.classList.remove('loading');
                icon.className = 'fas fa-arrow-right';
            }
        }

        async function handleSelectBusiness() {
            const business_id = document.getElementById('business-id').value;
            const btn = document.querySelector('#business-form .btn-login');
            const icon = btn.querySelector('i');
            
            btn.classList.add('loading');
            icon.className = 'fas fa-circle-notch fa-spin';

            const res = await fetch('auth.php?action=select_business', {
                method: 'POST',
                body: JSON.stringify({ business_id })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = 'app.html';
            } else {
                btn.classList.remove('loading');
                icon.className = 'fas fa-check';
            }
        }

        // Verificar si ya está logueado
        fetch('auth.php?action=check').then(r => r.json()).then(data => {
            if (data.logged_in && data.business_id) window.location.href = 'app.html';
        });
    </script>
</body>
</html>
